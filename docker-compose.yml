services:
  # ========== PostgreSQL Database ==========
  postgres:
    image: postgres:16-alpine
    container_name: arbitron-payment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arbitron
      POSTGRES_PASSWORD: arbitron_secure_password
      POSTGRES_DB: arbitron_payment
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - arbitron_payment_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbitron -d arbitron_payment"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    container_name: arbitron-payment-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - arbitron_payment_redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== API Server ==========
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: arbitron-payment-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: UTC
      DATABASE_URL: postgresql+asyncpg://arbitron:arbitron_secure_password@postgres:5432/arbitron_payment
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8123:8000"
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== EVM Log Poller Worker ==========
  worker-poller:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: arbitron-payment-worker-poller
    restart: unless-stopped
    command: ["python", "-m", "src.workers.evm_log_poller"]
    env_file:
      - .env
    environment:
      TZ: UTC
      DATABASE_URL: postgresql+asyncpg://arbitron:arbitron_secure_password@postgres:5432/arbitron_payment
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ========== Persistent Deposit Poller (User Wallets) ==========
  worker-persistent:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: arbitron-payment-worker-persistent
    restart: unless-stopped
    command: ["python", "-m", "src.workers.persistent_poller"]
    env_file:
      - .env
    environment:
      TZ: UTC
      DATABASE_URL: postgresql+asyncpg://arbitron:arbitron_secure_password@postgres:5432/arbitron_payment
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ========== Webhook Dispatcher Worker ==========
  worker-webhook:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: arbitron-payment-worker-webhook
    restart: unless-stopped
    command: ["python", "-m", "src.workers.webhook_dispatcher"]
    env_file:
      - .env
    environment:
      TZ: UTC
      DATABASE_URL: postgresql+asyncpg://arbitron:arbitron_secure_password@postgres:5432/arbitron_payment
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ========== Unified Sweeper Worker (Single sweep queue for all sources) ==========
  worker-sweeper:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: arbitron-payment-worker-sweeper
    restart: unless-stopped
    command: ["python", "-m", "src.workers.unified_sweeper_runner"]
    env_file:
      - .env
    environment:
      TZ: UTC
      DATABASE_URL: postgresql+asyncpg://arbitron:arbitron_secure_password@postgres:5432/arbitron_payment
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ========== Invoice Expirer Worker ==========
  worker-expirer:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: arbitron-payment-worker-expirer
    restart: unless-stopped
    command: ["python", "-m", "src.workers.invoice_expirer"]
    env_file:
      - .env
    environment:
      TZ: UTC
      DATABASE_URL: postgresql+asyncpg://arbitron:arbitron_secure_password@postgres:5432/arbitron_payment
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  arbitron_payment_postgres_data:
  arbitron_payment_redis_data:

networks:
  default:
    name: arbitron-payment-network
