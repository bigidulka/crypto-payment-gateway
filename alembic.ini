# Alembic configuration file

[alembic]
# путь к директории с миграциями
script_location = alembic

# шаблон имён файлов миграций
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# prepend sys.path
prepend_sys_path = .

# timezone для timestamp в revision
timezone = UTC

# truncate_slug_length
truncate_slug_length = 40

# output encoding
output_encoding = utf-8

# URL подключения к БД (переопределяется из env.py)
sqlalchemy.url = postgresql+asyncpg://gateway:payment_gateway_password@localhost:5433/payment_gateway

[post_write_hooks]
# форматирование миграций с помощью ruff
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
